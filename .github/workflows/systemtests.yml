# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: System Tests

on:
  push:
    branches: [ "release", "develop", "freeze", "feature/**" ]
  pull_request:
    branches: [ "release", "develop", "freeze", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "source-dir=$GITHUB_WORKSPACE" >> "$GITHUB_OUTPUT"
        echo "build-dir=$GITHUB_WORKSPACE/build" >> "$GITHUB_OUTPUT"

    - name: Install libboost (Linux)
      run: sudo apt-get install -y libboost-all-dev

    - name: Install lipcap-dev
      # libpcap-dev is required for the POWERLINK module
      run: sudo apt-get install -y libpcap-dev

    - name: Configure CMake
      run: >
        cmake
        -S ${{ steps.strings.outputs.source-dir }}
        -B ${{ steps.strings.outputs.build-dir }}
        --preset posix-systemtests

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-dir }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-dir }}
      run: ctest --verbose
